name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Use the project Flox environment
      - name: Install Flox
        uses: flox/install-flox-action@v2.4.0
        with:
          disable-metrics: "true"

      # 3. Run build.js in the main repo (FrameOS/cases)
      - name: Run build script (FrameOS/cases)
        run: flox activate -- npm run build

      # 4. Clone the openscad-playground repo
      - name: Clone openscad-playground
        run: git clone https://github.com/FrameOS/openscad-playground.git

      # 5. Build openscad-playground
      - name: Copy cases into openscad-playground
        run: cp dist/cases.json openscad-playground/src/cases.json

      - name: Build openscad-playground public assets
        run: flox activate -- make -C openscad-playground public

      - name: Install openscad-playground dependencies
        run: flox activate -- npm --prefix openscad-playground install

      - name: Build openscad-playground app
        env:
          NODE_ENV: production
        run: flox activate -- npm --prefix openscad-playground run build

      # 6. Deploy dist to openscad-playground-deploy 
      - name: Deploy dist to openscad-playground-deploy
        run: |
          # Clone deploy repo with shallow depth
          git clone --depth=1 \
            https://${{ secrets.CASES_DEPLOY_TOKEN }}@github.com/FrameOS/openscad-playground-deploy.git \
            deploy

          # Remove all existing files in the deploy repo (except .git)
          rm -rf deploy/*

          # Copy new dist files from openscad-playground
          cp -r openscad-playground/dist/* deploy

          # Commit and push changes
          cd deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          # If there are no changes, this will fail; so we use '|| echo' to prevent an error
          git commit -m "Deploy" || echo "No changes to commit"

          git push origin main
